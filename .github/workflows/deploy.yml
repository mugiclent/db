name: Deploy DB

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR="$HOME/katisha/db"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            # Clone on first deploy, pull on subsequent deploys
            if [ -d "$DEPLOY_DIR/.git" ]; then
              cd "$DEPLOY_DIR"
              git pull origin main
            else
              mkdir -p "$HOME/katisha"
              git clone "$REPO_URL" "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            # Write .env from GitHub secrets — secrets are the source of truth
            cat > .env <<ENVEOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            ENVEOF

            # Rebuild image if Dockerfile changed, recreate container if config changed.
            # Named volume db_data is never touched by this command.
            docker compose up -d --build

            # Wait for the container to be healthy
            echo "Waiting for db to be healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' db 2>/dev/null || echo "missing")
              [ "$STATUS" = "healthy" ] && break
              [ $i -eq 30 ] && echo "Timed out waiting for db" && exit 1
              sleep 2
            done

            # Re-run extensions SQL — CREATE EXTENSION IF NOT EXISTS is idempotent,
            # so this is always safe and ensures new extensions are activated
            # on existing volumes without any manual step.
            docker exec db psql \
              -U "${{ secrets.POSTGRES_USER }}" \
              -d "${{ secrets.POSTGRES_DB }}" \
              -f /docker-entrypoint-initdb.d/01-extensions.sql
