# postgresql.conf — edit here, commit, push. GitHub Actions will restart the container.
#
# Tune the memory values to ~25% of server RAM for shared_buffers
# and ~75% for effective_cache_size.

# ---------------------------------------------------------------------------
# CONNECTIONS
# ---------------------------------------------------------------------------
listen_addresses = '*'
max_connections  = 100

# ---------------------------------------------------------------------------
# MEMORY
# ---------------------------------------------------------------------------
shared_buffers       = 256MB
work_mem             = 4MB
maintenance_work_mem = 64MB
effective_cache_size = 768MB

# ---------------------------------------------------------------------------
# WAL / CHECKPOINTS
# ---------------------------------------------------------------------------
wal_level            = replica
max_wal_size         = 1GB
min_wal_size         = 80MB
checkpoint_completion_target = 0.9

# ---------------------------------------------------------------------------
# FULL-TEXT SEARCH
# ---------------------------------------------------------------------------
default_text_search_config = 'pg_catalog.english'

# ---------------------------------------------------------------------------
# LOGGING
# ---------------------------------------------------------------------------
log_timezone         = 'Africa/Kigali'
log_min_duration_statement = 1000   # log queries taking > 1 s
log_line_prefix      = '%t [%p] %u@%d '

# ---------------------------------------------------------------------------
# LOCALE
# ---------------------------------------------------------------------------
timezone             = 'Africa/Kigali'   # Rwanda — UTC+2 (CAT)
datestyle            = 'iso, mdy'
lc_messages          = 'en_US.utf8'
lc_monetary          = 'en_US.utf8'
lc_numeric           = 'en_US.utf8'
lc_time              = 'en_US.utf8'
